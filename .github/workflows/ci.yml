name: CI

on:
  push:
    branches: [main, development]
  pull_request:
    branches: [main, development]

jobs:
  ci:
    name: Lint · Typecheck · Test · Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Security audit
        run: pnpm audit --audit-level=high --ignore-registry-errors

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Vercel Build Validation
        run: |
          mkdir -p .vercel
          echo '{"projectId":"prj_I3P9RQqFK7tztjwxpfTIMnVvDXpj","orgId":"team_kDcY3EtjosSYFT6dL6CRRC3V"}' > .vercel/project.json
          npx vercel build --yes --token ${{ secrets.VERCEL_TOKEN }} || npx vercel build --yes

      - name: Check client bundle for leaks
        run: bash scripts/check-client-bundle.sh
